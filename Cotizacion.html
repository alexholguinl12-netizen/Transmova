<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cotización</title>
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body>

<header class="header">
  <h2>Sistema de Cotizaciones Transmova</h2>
  <nav>
    <a href="Menu.html">Menú</a>
    <a href="Proveedores.html">Proveedores</a>
    <a href="Cliente.html">Clientes</a>
    <a href="Producto.html">Productos</a>
    <a href="Cotizacion.html">Nueva cotización</a>
    <a href="Correcciones.html">Correcciones</a>
    <a href="historial.html">Histórico</a>
    <a href="aprobaciones.html" id="menuAprobaciones">Aprobaciones</a>
  </nav>
</header>

<div class="container">

  <h1>Nueva Cotización</h1>

  <!-- =========================
       BLOQUE SUPERIOR (2 COLUMNAS)
  ========================== -->
  <div class="grid-2">

    <!-- 🔹 DATOS COTIZACIÓN -->
    <div class="card">
      <h3>Datos de la cotización</h3>

      <div class="form-group">
        <label>Cliente</label>
        <select id="clienteSelect"></select>
      </div>

      <div class="form-group">
        <label>Evento</label>
        <input type="text" id="evento">
      </div>

      <div class="form-group">
        <label>Ciudad de ejecución</label>
        <input type="text" id="ciudad">
      </div>

      <div class="form-group">
        <label>Fecha de solicitud</label>
        <input type="date" id="fechaSolicitud">
      </div>

      <div class="form-group">
        <label>Fecha inicial</label>
        <input type="date" id="fechaInicial">
      </div>

      <div class="form-group">
        <label>Fecha final</label>
        <input type="date" id="fechaFinal">
      </div>

      <div class="form-group">
        <label>Forma de pago</label>
        <select id="formaPago">
          <option value="">Seleccione</option>
          <option value="Contado">Contado</option>
          <option value="Credito">Crédito</option>
        </select>
      </div>
    </div>

    <!-- 🔹 AGREGAR PRODUCTO -->
    <div class="card">
      <h3>Agregar producto</h3>
<div class="form-group">
  <label>Producto</label>
  <select id="productoSelect"></select>
</div>

<div class="form-group">
  <label>Costo</label>
  <input type="number" id="costo" disabled>
</div>

<div class="form-group">
  <label>Venta</label>
  <input type="number" id="venta" step="0.01">
</div>

<div class="form-group">
  <label>Rentabilidad (%)</label>
  <input type="text" id="rentabilidad" disabled>
</div>

<div class="form-group">
  <label>Descripción</label>
  <input type="text" id="descripcion">
</div>

<div class="form-group">
  <label>Cantidad</label>
  <input type="number" id="cantidad" value="1">
</div>

      <button class="btn" onclick="agregarProducto()">
        ➕ Agregar producto
      </button>
    </div>

  </div>

  <!-- =========================
       DETALLE (FULL WIDTH)
  ========================== -->
  <div class="card">
    <h2>Detalle de la cotización</h2>

    <table class="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Precio</th>
          <th>Descripción</th>
          <th>Cantidad</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="detalleCotizacion"></tbody>
    </table>

    <h3 style="margin-top: 15px;">
      Total Cotización: $<span id="totalCotizacion">0</span>
    </h3>
  </div>

  <!-- =========================
       ACCIONES
  ========================== -->
  <!-- BOTÓN -->
  <div class="card">
    <button class="btn" onclick="guardarCotizacion()">
      💾 Guardar y generar PDF
    </button>
  </div>

</div>

<script type="module" src="assets/auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="assets/cotizaciones.js"></script>
<script type="module" src="assets/roles.js"></script>

</body>
</html>
