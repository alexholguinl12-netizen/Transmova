<div class="container">

  <h1>Proveedores</h1>

  <!-- FORMULARIO -->
  <div class="card">

    <h3>Registrar / Editar proveedor</h3>

    <div class="form-group">
      <label>Razón social</label>
      <input id="razon_social">
    </div>

    <div class="form-group">
      <label>NIT</label>
      <input id="nit">
    </div>

    <div class="form-group">
      <label>Teléfono empresa</label>
      <input id="telefono_empresa">
    </div>

    <div class="form-group">
      <label>Nombre contacto</label>
      <input id="nombre_contacto">
    </div>

    <div class="form-group">
      <label>Teléfono contacto</label>
      <input id="telefono_contacto">
    </div>

    <button class="btn" onclick="guardarProveedor()">
      💾 Guardar proveedor
    </button>

  </div>

  <!-- TABLA -->
  <div class="card">

    <h2>Proveedores registrados</h2>

    <table class="tabla">
      <thead>
        <tr>
          <th>Razón Social</th>
          <th>NIT</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="tablaProveedores"></tbody>
    </table>

  </div>
