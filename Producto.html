<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body>

<header class="header">
  <h1>Sistema de Cotizaciones Transmova</h1>
  <nav>
    <a href="Menu.html">Menú</a>
    <a href="Proveedores.html">Proveedores</a>
    <a href="Cliente.html">Clientes</a>
    <a href="Producto.html">Productos</a>
    <a href="Cotizacion.html">Nueva cotización</a>
    <a href="Correcciones.html">Correcciones</a>
    <a href="historial.html">Histórico</a>
    <a href="aprobaciones.html" id="menuAprobaciones">Aprobaciones</a>
    <a href="dashboard.html">Dashboard</a>
    
</header>

<div class="container">

  <h1>Productos</h1>

  <!-- FORMULARIO -->
  <div class="card">
    <h3>Registrar / Editar producto</h3>

    <form id="formProducto">

      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" id="nombre_producto" placeholder="Ej: Transporte urbano">
      </div>

      <div class="form-group">
        <label>Costo</label>
        <input type="number" id="costo" placeholder="Ej: 50000">
      </div>

      <div class="form-group">
        <label>Unidad</label>
        <input type="text" id="unidad" placeholder="Ej: Servicio, Hora, Km">
      </div>

      <div class="form-group">
        <label>Proveedor</label>
        <select id="proveedorSelect"></select>
      </div>

      <button type="button" class="btn" onclick="guardarProducto()">
        💾 Guardar producto
      </button>

    </form>
  </div>

  <!-- TABLA -->
  <div class="card">
    <h2>Productos registrados</h2>

    <table class="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Costo</th>
          <th>Unidad</th>
          <th>Proveedor</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaProductos"></tbody>
    </table>
  </div>

</div>

<script type="module" src="assets/auth.js"></script>
<script type="module" src="assets/productos.js"></script>
<script type="module" src="assets/roles.js"></script>

</body>
</html>
